<h1>{{ portalName }}</h1>

<p><b>Courses Available: </b>{{ availableCourses }}</p>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Search course">

<p>Searching for: {{ searchTerm }}</p>

<!--
[property] -> One-way binding (Component → DOM)

[(ngModel)] -> Two-way binding (DOM ↔ Component)
-->
