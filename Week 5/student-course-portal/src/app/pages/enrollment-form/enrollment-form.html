<h2>Student Enrollment Form</h2>

<form
  #enrollForm="ngForm"
  (ngSubmit)="onSubmit(enrollForm)">

  <!-- Student Name -->

  <label>Name:</label>

  <input
    type="text"
    name="studentName"
    ngModel
    required
    minlength="3"
    #nameCtrl="ngModel">

  <div *ngIf="nameCtrl.touched">

    <span *ngIf="nameCtrl.errors?.['required']">
      Name is required
    </span>

    <span *ngIf="nameCtrl.errors?.['minlength']">
      Name must be at least 3 characters
    </span>

  </div>

  <br><br>

  <!-- Email -->

  <label>Email:</label>

  <input
    type="email"
    name="studentEmail"
    ngModel
    required
    email
    #emailCtrl="ngModel">

  <div *ngIf="emailCtrl.touched">

    <span *ngIf="emailCtrl.errors?.['required']">
      Email is required
    </span>

    <span *ngIf="emailCtrl.errors?.['email']">
      Invalid email
    </span>

  </div>

  <br><br>

  <!-- Course ID -->

  <label>Course ID:</label>

  <input
    type="number"
    name="courseId"
    ngModel
    required
    #courseCtrl="ngModel">

  <div *ngIf="courseCtrl.touched">

    <span *ngIf="courseCtrl.errors?.['required']">
      Course ID is required
    </span>

  </div>

  <br><br>

  <!-- Semester -->

  <label>Semester:</label>

  <select
    name="preferredSemester"
    ngModel
    required
    #semesterCtrl="ngModel">

    <option value="">Select</option>
    <option value="Odd">Odd</option>
    <option value="Even">Even</option>

  </select>

  <br><br>

  <!-- Terms -->

  <label>

    <input
      type="checkbox"
      name="agreeToTerms"
      ngModel
      required
      #termsCtrl="ngModel">

    I agree to Terms

  </label>

  <br><br>

  <!-- Submit -->

  <button
    type="submit"
    [disabled]="enrollForm.invalid">

    Submit

  </button>

  <!-- Reset -->

  <button
    type="button"
    (click)="enrollForm.resetForm()">

    Reset

  </button>

</form>

<div *ngIf="submitted">

  <h3>
    Enrollment request submitted successfully!
  </h3>

</div>
